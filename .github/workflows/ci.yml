name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: make install
      - name: Format check
        run: black --check .
      - name: Train model
        run: python model/train.py
      - name: Run tests
        run: pytest tests/ -v